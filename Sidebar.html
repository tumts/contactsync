<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <?!= include('Dashboard.css'); ?>
  <style>
    .sidebar-container { padding: 12px; }
    .sidebar-header { text-align: center; margin-bottom: 16px; }
    .sidebar-header h2 { font-size: 16px; color: #1a73e8; margin-bottom: 4px; }
    .sidebar-header p { font-size: 11px; color: #888; }
    .mini-overview { margin-bottom: 16px; }
    .mini-stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    .mini-stat-label { color: #555; }
    .mini-stat-value { font-weight: 600; color: #1a73e8; }
    .sidebar-actions { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-actions .btn { width: 100%; text-align: center; font-size: 12px; padding: 8px 12px; }
    .sidebar-alert { margin: 8px 0; }
  </style>
</head>
<body>
  <div class="sidebar-container">
    <div class="sidebar-header">
      <h2>ContactSync</h2>
      <p>Quick Access Panel</p>
    </div>

    <div id="sidebar-alert" class="sidebar-alert"></div>

    <button class="btn btn-primary" style="width:100%;margin-bottom:16px;" onclick="openFullDashboard()">
      Open Full Dashboard
    </button>

    <div class="mini-overview" id="mini-overview">
      <div style="text-align:center;color:#888;font-size:12px;">Loading...</div>
    </div>

    <div class="section-title" style="font-size:14px;">Quick Actions</div>
    <div class="sidebar-actions">
      <button class="btn btn-primary" onclick="sidebarAction('scanDataSiswa')">Scan DataSiswa</button>
      <button class="btn btn-primary" onclick="sidebarAction('validateContacts')">Validate</button>
      <button class="btn btn-primary" onclick="sidebarAction('previewSync')">Preview Sync</button>
      <button class="btn btn-success" onclick="sidebarAction('runSync')">Run Sync</button>
    </div>

    <div class="section-title" style="font-size:14px;margin-top:16px;">Settings</div>
    <div class="sidebar-actions">
      <div class="form-group" style="margin-bottom:8px;">
        <label style="font-size:11px;">Year Label</label>
        <input type="text" id="sb-year-label" class="form-control" style="font-size:12px;padding:6px 8px;" />
      </div>
      <div class="form-group" style="margin-bottom:8px;">
        <label style="font-size:11px;">Naming Preset</label>
        <select id="sb-naming-preset" class="form-control" style="font-size:12px;padding:6px 8px;">
          <option value="1">First Last</option>
          <option value="2">Last, First</option>
          <option value="3">Full Name</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:8px;">
        <label style="font-size:11px;">Default Status</label>
        <select id="sb-student-status" class="form-control" style="font-size:12px;padding:6px 8px;">
          <option value="aktif">Aktif</option>
          <option value="berhenti">Berhenti</option>
          <option value="lulus">Lulus</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:8px;">
        <label style="font-size:11px;">Parent Mode</label>
        <select id="sb-parent-mode" class="form-control" style="font-size:12px;padding:6px 8px;">
          <option value="consolidated">Consolidated</option>
          <option value="separate">Separate</option>
        </select>
      </div>
      <button class="btn btn-success" style="width:100%;font-size:12px;" onclick="saveSidebarSettings()">Save Settings</button>
      <button class="btn btn-secondary" style="width:100%;font-size:12px;margin-top:4px;" onclick="openFullConfig()">All Settings...</button>
    </div>
  </div>

  <script>
    function esc(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(String(str || '')));
      return div.innerHTML;
    }

    function openFullDashboard() {
      google.script.run.openDashboard();
    }

    function loadMiniOverview() {
      google.script.run
        .withSuccessHandler(function(data) {
          var el = document.getElementById('mini-overview');
          if (!el) return;
          if (typeof data === 'string') {
            try { data = JSON.parse(data); } catch(e) { return; }
          }
          var html = '';
          html += '<div class="mini-stat"><span class="mini-stat-label">Total Contacts</span><span class="mini-stat-value">' + (data.totalContacts || 0) + '</span></div>';
          html += '<div class="mini-stat"><span class="mini-stat-label">Synced</span><span class="mini-stat-value">' + (data.synced || 0) + '</span></div>';
          html += '<div class="mini-stat"><span class="mini-stat-label">Pending</span><span class="mini-stat-value">' + (data.pending || 0) + '</span></div>';
          html += '<div class="mini-stat"><span class="mini-stat-label">Errors</span><span class="mini-stat-value">' + (data.errors || 0) + '</span></div>';
          el.innerHTML = html;
        })
        .withFailureHandler(function(err) {
          var el = document.getElementById('mini-overview');
          if (el) el.innerHTML = '<div style="color:#c5221f;font-size:12px;">Failed to load overview</div>';
        })
        .getOverviewData();
    }

    function sidebarAction(actionName) {
      var alertEl = document.getElementById('sidebar-alert');
      if (alertEl) {
        alertEl.innerHTML = '<div class="alert alert-info" style="font-size:12px;">Running ' + esc(actionName) + '...</div>';
      }
      var btns = document.querySelectorAll('.btn');
      for (var i = 0; i < btns.length; i++) btns[i].disabled = true;

      google.script.run
        .withSuccessHandler(function(result) {
          var data = result;
          if (typeof data === 'string') {
            try { data = JSON.parse(data); } catch(e) {}
          }
          var msg = (data && data.message) ? data.message : actionName + ' completed';
          if (alertEl) {
            alertEl.innerHTML = '<div class="alert alert-success" style="font-size:12px;">' + esc(msg) + '</div>';
          }
          for (var i = 0; i < btns.length; i++) btns[i].disabled = false;
          loadMiniOverview();
        })
        .withFailureHandler(function(err) {
          if (alertEl) {
            alertEl.innerHTML = '<div class="alert alert-error" style="font-size:12px;">' + esc(actionName) + ' failed: ' + esc(err.message) + '</div>';
          }
          for (var i = 0; i < btns.length; i++) btns[i].disabled = false;
        })[actionName]();
    }

    function loadSidebarSettings() {
      google.script.run
        .withSuccessHandler(function(config) {
          if (typeof config === 'string') {
            try { config = JSON.parse(config); } catch(e) { return; }
          }
          var yearEl = document.getElementById('sb-year-label');
          var presetEl = document.getElementById('sb-naming-preset');
          var statusEl = document.getElementById('sb-student-status');
          var parentEl = document.getElementById('sb-parent-mode');
          if (yearEl) yearEl.value = config.DEFAULT_YEAR_LABEL || '2026';
          if (presetEl) presetEl.value = config.NAMING_PRESET || '1';
          if (statusEl) statusEl.value = config.DEFAULT_STUDENT_STATUS || 'aktif';
          if (parentEl) parentEl.value = config.PARENT_CONTACT_MODE || 'consolidated';
        })
        .withFailureHandler(function() {})
        .loadConfig();
    }

    function saveSidebarSettings() {
      var alertEl = document.getElementById('sidebar-alert');
      if (alertEl) alertEl.innerHTML = '<div class="alert alert-info" style="font-size:12px;">Saving...</div>';

      var updates = {};
      var yearEl = document.getElementById('sb-year-label');
      var presetEl = document.getElementById('sb-naming-preset');
      var statusEl = document.getElementById('sb-student-status');
      var parentEl = document.getElementById('sb-parent-mode');
      if (yearEl) updates.DEFAULT_YEAR_LABEL = yearEl.value;
      if (presetEl) updates.NAMING_PRESET = presetEl.value;
      if (statusEl) updates.DEFAULT_STUDENT_STATUS = statusEl.value;
      if (parentEl) updates.PARENT_CONTACT_MODE = parentEl.value;

      var keys = Object.keys(updates);
      var saved = 0;
      for (var i = 0; i < keys.length; i++) {
        google.script.run
          .withSuccessHandler(function() {
            saved++;
            if (saved >= keys.length && alertEl) {
              alertEl.innerHTML = '<div class="alert alert-success" style="font-size:12px;">Settings saved</div>';
            }
          })
          .setConfigValue(keys[i], updates[keys[i]]);
      }
    }

    function openFullConfig() {
      google.script.run.openConfigDialog();
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadMiniOverview();
      loadSidebarSettings();
    });
  </script>
</body>
</html>
