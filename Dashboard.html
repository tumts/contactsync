<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ContactSync Dashboard</title>
  <?!= include('Dashboard.css'); ?>
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <div class="app-header">
      <h1>ContactSync Dashboard</h1>
      <p>Sinkronisasi data siswa &amp; orang tua ke Google Contacts</p>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" data-tab="contacts" onclick="switchTab('contacts')">Contacts</button>
      <button class="tab-btn" data-tab="sync" onclick="switchTab('sync')">Sync</button>
      <button class="tab-btn" data-tab="wacheck" onclick="switchTab('wacheck')">WA Check</button>
      <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">Logs</button>
      <button class="tab-btn" data-tab="config" onclick="switchTab('config')">Config</button>
      <button class="tab-btn" data-tab="quality" onclick="switchTab('quality')">Data Quality</button>
    </div>

    <!-- TAB 1: Overview -->
    <div id="tab-overview" class="tab-content active">
      <div id="overview-alert"></div>
      <div id="overview-cards"></div>
      <div class="section-title">Quick Actions</div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="runAction('initializeWorkspace','overview-alert')">Initialize Workspace</button>
        <button class="btn btn-primary" onclick="runAction('scanDataSiswa','overview-alert')">Scan DataSiswa</button>
        <button class="btn btn-primary" onclick="runAction('validateContacts','overview-alert')">Validate</button>
        <button class="btn btn-primary" onclick="runAction('previewSync','overview-alert')">Preview Sync</button>
        <button class="btn btn-success" onclick="runAction('runSync','overview-alert')">Run Sync</button>
      </div>
    </div>

    <!-- TAB 2: Contacts -->
    <div id="tab-contacts" class="tab-content">
      <div id="contacts-alert"></div>
      <input type="text" id="contacts-search" class="contacts-search-bar" placeholder="Cari nama, phone, email..." onkeyup="filterContacts()">
      <div id="contacts-filter-pills" class="filter-pills"></div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="loadContacts()">Refresh Table</button>
      </div>
      <div id="contacts-table-wrap"></div>
    </div>

    <!-- TAB 3: Sync -->
    <div id="tab-sync" class="tab-content">
      <div id="sync-alert"></div>

      <div class="section-title">Sync Settings</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label for="sync-class-label">Class Label</label>
          <input type="text" id="sync-class-label" class="form-control" placeholder="e.g. 7A" />
        </div>
        <div class="form-group">
          <label for="sync-year-label">Year Label</label>
          <input type="text" id="sync-year-label" class="form-control" value="2026" />
        </div>
      </div>

      <div class="form-group">
        <label for="sync-preset">Naming Preset</label>
        <select id="sync-preset" class="form-control" onchange="updateNamingPreview()">
          <option value="1">Preset 1: First Last</option>
          <option value="2">Preset 2: Last, First</option>
          <option value="3">Preset 3: Full Name</option>
        </select>
      </div>

      <div class="form-group">
        <label for="sync-student-status">Default Student Status</label>
        <select id="sync-student-status" class="form-control">
          <option value="aktif">Aktif</option>
          <option value="berhenti">Berhenti</option>
          <option value="lulus">Lulus</option>
        </select>
      </div>

      <div id="naming-preview-area"></div>

      <div class="form-group">
        <label>Parent Contact Mode</label>
        <div>
          <label style="font-weight:normal;margin-right:16px;">
            <input type="radio" name="parent-mode" value="consolidated" checked /> Consolidated (parent info in student contact)
          </label>
          <label style="font-weight:normal;">
            <input type="radio" name="parent-mode" value="separate" /> Separate (create separate contacts for parents)
          </label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="saveSyncConfig()">Save Settings</button>
        <button class="btn btn-primary" onclick="runPreviewSync()">Preview Sync</button>
        <button class="btn btn-success" onclick="runExecuteSync()">Execute Sync</button>
        <button id="btn-cancel-sync" class="btn btn-danger" onclick="cancelRunningSync()" style="display:none;">Cancel Sync</button>
      </div>

      <div id="sync-progress"></div>
    </div>

    <!-- TAB 4: WA Check -->
    <div id="tab-wacheck" class="tab-content">
      <div id="wa-alert"></div>

      <div class="section-title">WhatsApp Number Verification</div>
      <div style="margin-bottom:12px;">
        <span>Status: </span>
        <span id="wa-status-indicator"><span class="status-dot dot-gray"></span>Unknown</span>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="testWaConnection()">Test Connection</button>
        <button class="btn btn-success" onclick="runCheckAllNumbers()">Check All Numbers</button>
      </div>

      <div id="wa-progress"></div>
      <div id="wa-summary"></div>
    </div>

    <!-- TAB 5: Logs -->
    <div id="tab-logs" class="tab-content">
      <div id="logs-alert"></div>

      <div class="filter-bar">
        <select id="log-filter-action" onchange="filterLogs()">
          <option value="">All Actions</option>
          <option value="scan">Scan</option>
          <option value="validate">Validate</option>
          <option value="preview">Preview</option>
          <option value="sync">Sync</option>
          <option value="create">Create</option>
          <option value="update">Update</option>
          <option value="waCheck">WA Check</option>
          <option value="waCheckAll">WA Check All</option>
          <option value="initialize">Initialize</option>
          <option value="findDuplicates">Find Duplicates</option>
          <option value="refresh">Refresh</option>
          <option value="migrate">Migrate</option>
        </select>

        <select id="log-filter-result" onchange="filterLogs()">
          <option value="">All Results</option>
          <option value="success">Success</option>
          <option value="error">Error</option>
          <option value="warning">Warning</option>
          <option value="partial">Partial</option>
        </select>

        <button class="btn btn-secondary" onclick="loadLogs()">Refresh Logs</button>
        <button class="btn btn-danger" onclick="clearAllLogs()">Clear Logs</button>
      </div>

      <div id="logs-table-wrap"></div>
    </div>

    <!-- TAB 6: Config -->
    <div id="tab-config" class="tab-content">
      <div id="config-alert"></div>

      <div class="section-title">Configuration</div>
      <div id="config-form-area"></div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="saveAllConfig()">Save Config</button>
        <button class="btn btn-secondary" onclick="resetConfigDefaults()">Reset to Defaults</button>
      </div>
    </div>

    <!-- TAB 7: Data Quality -->
    <div id="tab-quality" class="tab-content">
      <div id="quality-alert"></div>

      <div class="section-title">Data Quality Report</div>

      <div id="quality-filter-pills" class="filter-pills">
        <span class="filter-pill" onclick="filterInvalidByType('')">All</span>
        <span class="filter-pill" onclick="filterInvalidByType('fullName is required')">Nama Kosong</span>
        <span class="filter-pill" onclick="filterInvalidByType('phonePrimary')">Phone Invalid</span>
        <span class="filter-pill" onclick="filterInvalidByType('emailPrimary')">Email Invalid</span>
        <span class="filter-pill" onclick="filterInvalidByType('classLabel is empty')">Kelas Kosong</span>
        <span class="filter-pill" onclick="filterInvalidByType('yearLabel is empty')">Year Kosong</span>
        <span class="filter-pill" onclick="filterInvalidByType('studentStatus')">Status Invalid</span>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="loadQualityTab()">Refresh</button>
        <button class="btn btn-success" onclick="exportInvalidCSV()">Export CSV for SiswaHub</button>
      </div>

      <div id="quality-table-wrap"></div>
    </div>

    <!-- Contact Detail Modal -->
    <div id="contact-modal"></div>

  </div>

  <?!= include('Dashboard.js'); ?>
</body>
</html>
