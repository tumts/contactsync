<script>
/* =============================================
   Dashboard.js — ContactSync Dashboard Logic
   CONSTRAINT: No template literals with HTML.
   Uses string concatenation with + operator.
   ============================================= */

/* === Globals === */
var currentTab = 'overview';
var contactsData = [];
var filteredContactsData = [];
var contactsPage = 1;
var contactsPerPage = 20;
var logsData = [];
var activeFilters = {};
var qualityData = [];
var qualityFilterType = '';
var syncProgressInterval = null;

/* === Initialization === */
document.addEventListener('DOMContentLoaded', function() {
  switchTab('overview');
  loadOverview();
});

/* === HTML Escape === */
function esc(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* === Tab Navigation === */
function switchTab(tabId) {
  currentTab = tabId;
  var tabs = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabs.length; i++) {
    if (tabs[i].getAttribute('data-tab') === tabId) {
      tabs[i].classList.add('active');
    } else {
      tabs[i].classList.remove('active');
    }
  }
  var contents = document.querySelectorAll('.tab-content');
  for (var j = 0; j < contents.length; j++) {
    if (contents[j].id === 'tab-' + tabId) {
      contents[j].classList.add('active');
    } else {
      contents[j].classList.remove('active');
    }
  }

  if (tabId === 'overview') loadOverview();
  else if (tabId === 'contacts') loadContacts();
  else if (tabId === 'sync') loadSyncTab();
  else if (tabId === 'wacheck') loadWaTab();
  else if (tabId === 'logs') loadLogs();
  else if (tabId === 'config') loadConfigTab();
  else if (tabId === 'quality') loadQualityTab();
}

/* === Notifications === */
function showAlert(containerId, type, message) {
  var el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<div class="alert alert-' + type + '">' + esc(message) + '</div>';
}

function showLoading(containerId, message) {
  var el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<span class="spinner"></span><span class="loading-text">' + esc(message || 'Loading...') + '</span>';
}

function clearElement(id) {
  var el = document.getElementById(id);
  if (el) el.innerHTML = '';
}

/* === Parse server response === */
function parseResult(result) {
  if (typeof result === 'string') {
    try { return JSON.parse(result); } catch(e) { return { raw: result }; }
  }
  return result;
}

/* ============================================
   TAB 1: OVERVIEW
   ============================================ */
function loadOverview() {
  var el = document.getElementById('overview-cards');
  if (el) {
    el.innerHTML = '<div class="card-grid">' +
      '<div class="skeleton skeleton-card"></div>' +
      '<div class="skeleton skeleton-card"></div>' +
      '<div class="skeleton skeleton-card"></div>' +
      '<div class="skeleton skeleton-card"></div>' +
      '<div class="skeleton skeleton-card"></div>' +
    '</div>';
  }
  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      renderOverviewCards(data);
    })
    .withFailureHandler(function(err) {
      showAlert('overview-alert', 'error', 'Failed to load overview: ' + err.message);
    })
    .getOverviewData();
}

function renderOverviewCards(data) {
  var el = document.getElementById('overview-cards');
  if (!el) return;

  var total = (data && data.totalContacts) || 0;
  var synced = (data && data.synced) || 0;
  var pending = (data && data.pending) || 0;
  var errors = (data && data.errors) || 0;
  var lastSync = (data && data.lastSync) || 'Never';
  var students = (data && data.totalStudents) || 0;

  var html = '<div class="card-grid">';
  html += buildCard(students, 'Total Siswa');
  html += buildCard(total, 'Total Contacts');
  html += buildCard(synced, 'Synced');
  html += buildCard(pending, 'Pending');
  html += buildCard(errors, 'Errors');
  html += '</div>';
  html += '<p style="font-size:12px;color:#888;">Last sync: ' + esc(lastSync) + '</p>';

  var breakdown = (data && data.classBreakdown) || [];
  if (breakdown.length > 0) {
    html += '<div class="section-title">Ringkasan per Kelas</div>';
    html += '<table class="mini-dashboard-table">';
    html += '<thead><tr><th>Kelas</th><th>Total</th><th>Synced</th><th>Pending</th><th>Errors</th></tr></thead>';
    html += '<tbody>';
    for (var b = 0; b < breakdown.length; b++) {
      var cls = breakdown[b];
      html += '<tr>';
      html += '<td>' + esc(cls.classLabel) + '</td>';
      html += '<td>' + esc(String(cls.total)) + '</td>';
      html += '<td>' + esc(String(cls.synced)) + '</td>';
      html += '<td>' + esc(String(cls.pending)) + '</td>';
      html += '<td>' + esc(String(cls.errors)) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
  }

  el.innerHTML = html;
}

function buildCard(value, label) {
  return '<div class="card">' +
    '<div class="card-value">' + esc(String(value)) + '</div>' +
    '<div class="card-label">' + esc(label) + '</div>' +
  '</div>';
}

function runAction(actionName, alertId) {
  showLoading(alertId, 'Running ' + actionName + '...');
  disableButtons(true);

  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      var msg = data.message || (actionName + ' completed successfully');
      showAlert(alertId, 'success', msg);
      disableButtons(false);
      if (currentTab === 'overview') loadOverview();
    })
    .withFailureHandler(function(err) {
      showAlert(alertId, 'error', actionName + ' failed: ' + err.message);
      disableButtons(false);
    })[actionName]();
}

function disableButtons(disabled) {
  var btns = document.querySelectorAll('.btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = disabled;
  }
}

/* ============================================
   TAB 2: CONTACTS TABLE
   ============================================ */
function loadContacts() {
  var el = document.getElementById('contacts-table-wrap');
  if (el) {
    el.innerHTML = '<div class="skeleton skeleton-row" style="width:100%"></div>' +
      '<div class="skeleton skeleton-row" style="width:90%"></div>' +
      '<div class="skeleton skeleton-row" style="width:95%"></div>';
  }
  google.script.run
    .withSuccessHandler(function(result) {
      contactsData = parseResult(result);
      if (!Array.isArray(contactsData)) contactsData = [];
      filteredContactsData = contactsData.slice();
      activeFilters = {};
      contactsPage = 1;
      renderFilterPills();
      renderContactsTable();
    })
    .withFailureHandler(function(err) {
      showAlert('contacts-alert', 'error', 'Failed to load contacts: ' + err.message);
    })
    .getContactsList();
}

function renderContactsTable() {
  var el = document.getElementById('contacts-table-wrap');
  if (!el) return;

  var data = filteredContactsData;
  if (data.length === 0) {
    el.innerHTML = '<div class="alert alert-info">No contacts found. Run "Scan DataSiswa" first.</div>';
    return;
  }

  var totalPages = Math.ceil(data.length / contactsPerPage);
  var start = (contactsPage - 1) * contactsPerPage;
  var end = Math.min(start + contactsPerPage, data.length);
  var pageData = data.slice(start, end);

  var html = '<div class="table-wrap"><table>';
  html += '<thead><tr>';
  html += '<th>Name</th><th>Class</th><th>Status</th><th>Phone</th><th>Email</th><th>WA Status</th><th>Sync Status</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < pageData.length; i++) {
    var c = pageData[i];
    var globalIdx = start + i;
    html += '<tr class="clickable-row" onclick="showContactDetail(' + globalIdx + ')">';
    html += '<td>' + esc(c.fullName) + '</td>';
    html += '<td>' + esc(c.classLabel) + '</td>';
    html += '<td>' + buildStatusBadge(c.studentStatus) + '</td>';
    html += '<td>' + esc(c.phonePrimary) + '</td>';
    html += '<td>' + esc(c.emailPrimary) + '</td>';
    html += '<td>' + buildWaDot(c.waPhoneStatus) + '</td>';
    html += '<td>' + buildSyncBadge(c.syncStatus) + '</td>';
    html += '</tr>';
  }

  html += '</tbody></table></div>';

  html += '<div class="pagination">';
  html += '<button onclick="prevContactsPage()" ' + (contactsPage <= 1 ? 'disabled' : '') + '>Prev</button>';
  html += '<span class="page-info">Page ' + contactsPage + ' of ' + totalPages + ' (' + data.length + ' total)</span>';
  html += '<button onclick="nextContactsPage()" ' + (contactsPage >= totalPages ? 'disabled' : '') + '>Next</button>';
  html += '</div>';

  el.innerHTML = html;
}

function buildStatusBadge(status) {
  var s = String(status || '').trim().toLowerCase();
  if (s === 'aktif') return '<span class="badge badge-green">aktif</span>';
  if (s === 'berhenti') return '<span class="badge badge-yellow">berhenti</span>';
  if (s === 'lulus') return '<span class="badge badge-gray">lulus</span>';
  return '<span class="badge badge-gray">' + esc(s || '-') + '</span>';
}

function buildWaDot(status) {
  var dotClass = 'dot-gray';
  var label = status || 'unchecked';
  if (status === 'active') dotClass = 'dot-green';
  else if (status === 'inactive') dotClass = 'dot-red';
  else if (status === 'error') dotClass = 'dot-yellow';
  return '<span class="status-dot ' + dotClass + '"></span>' + esc(label);
}

function buildSyncBadge(status) {
  var badgeClass = 'badge-gray';
  var label = status || 'pending';
  if (status === 'synced') badgeClass = 'badge-green';
  else if (status === 'error') badgeClass = 'badge-red';
  else if (status === 'pending') badgeClass = 'badge-gray';
  return '<span class="badge ' + badgeClass + '">' + esc(label) + '</span>';
}

function prevContactsPage() {
  if (contactsPage > 1) { contactsPage--; renderContactsTable(); }
}

function nextContactsPage() {
  var totalPages = Math.ceil(filteredContactsData.length / contactsPerPage);
  if (contactsPage < totalPages) { contactsPage++; renderContactsTable(); }
}

/* === Contacts Search & Filter === */
function filterContacts() {
  var searchEl = document.getElementById('contacts-search');
  var keyword = searchEl ? searchEl.value.trim().toLowerCase() : '';

  filteredContactsData = [];
  for (var i = 0; i < contactsData.length; i++) {
    var c = contactsData[i];
    var matchesKeyword = true;
    if (keyword) {
      var searchFields = [
        String(c.fullName || '').toLowerCase(),
        String(c.phonePrimary || '').toLowerCase(),
        String(c.emailPrimary || '').toLowerCase(),
        String(c.classLabel || '').toLowerCase()
      ].join(' ');
      matchesKeyword = searchFields.indexOf(keyword) !== -1;
    }

    var matchesFilter = true;
    var filterKeys = Object.keys(activeFilters);
    for (var f = 0; f < filterKeys.length; f++) {
      var fType = filterKeys[f];
      var fVal = activeFilters[fType];
      if (fVal) {
        var contactVal = String(c[fType] || '').trim();
        if (contactVal !== fVal) {
          matchesFilter = false;
          break;
        }
      }
    }

    if (matchesKeyword && matchesFilter) {
      filteredContactsData.push(c);
    }
  }

  contactsPage = 1;
  renderContactsTable();
}

function renderFilterPills() {
  var el = document.getElementById('contacts-filter-pills');
  if (!el) return;

  var classValues = {};
  var syncValues = {};
  var waValues = {};
  var statusValues = {};

  for (var i = 0; i < contactsData.length; i++) {
    var c = contactsData[i];
    var cl = String(c.classLabel || '').trim();
    var ss = String(c.syncStatus || '').trim();
    var ws = String(c.waPhoneStatus || '').trim();
    var st = String(c.studentStatus || '').trim();
    if (cl) classValues[cl] = true;
    if (ss) syncValues[ss] = true;
    if (ws) waValues[ws] = true;
    if (st) statusValues[st] = true;
  }

  var html = '<strong style="font-size:11px;color:#888;margin-right:4px;">Kelas:</strong>';
  var classes = Object.keys(classValues).sort();
  for (var c = 0; c < classes.length; c++) {
    var active = activeFilters.classLabel === classes[c] ? ' active' : '';
    html += '<span class="filter-pill' + active + '" onclick="toggleFilterPill(\'classLabel\',\'' + esc(classes[c]) + '\')">' + esc(classes[c]) + '</span>';
  }

  html += ' <strong style="font-size:11px;color:#888;margin-right:4px;margin-left:8px;">Sync:</strong>';
  var syncs = Object.keys(syncValues).sort();
  for (var s = 0; s < syncs.length; s++) {
    var active2 = activeFilters.syncStatus === syncs[s] ? ' active' : '';
    html += '<span class="filter-pill' + active2 + '" onclick="toggleFilterPill(\'syncStatus\',\'' + esc(syncs[s]) + '\')">' + esc(syncs[s]) + '</span>';
  }

  html += ' <strong style="font-size:11px;color:#888;margin-right:4px;margin-left:8px;">WA:</strong>';
  var was = Object.keys(waValues).sort();
  for (var w = 0; w < was.length; w++) {
    var active3 = activeFilters.waPhoneStatus === was[w] ? ' active' : '';
    html += '<span class="filter-pill' + active3 + '" onclick="toggleFilterPill(\'waPhoneStatus\',\'' + esc(was[w]) + '\')">' + esc(was[w]) + '</span>';
  }

  var statuses = Object.keys(statusValues).sort();
  if (statuses.length > 0) {
    html += ' <strong style="font-size:11px;color:#888;margin-right:4px;margin-left:8px;">Status:</strong>';
    for (var t = 0; t < statuses.length; t++) {
      var active4 = activeFilters.studentStatus === statuses[t] ? ' active' : '';
      html += '<span class="filter-pill' + active4 + '" onclick="toggleFilterPill(\'studentStatus\',\'' + esc(statuses[t]) + '\')">' + esc(statuses[t]) + '</span>';
    }
  }

  el.innerHTML = html;
}

function toggleFilterPill(type, value) {
  if (activeFilters[type] === value) {
    delete activeFilters[type];
  } else {
    activeFilters[type] = value;
  }
  renderFilterPills();
  filterContacts();
}

/* === Contact Detail Modal === */
function showContactDetail(index) {
  var c = filteredContactsData[index];
  if (!c) return;

  var fields = [
    ['Full Name', c.fullName],
    ['Given Name', c.givenName],
    ['Family Name', c.familyName],
    ['Middle Name', c.middleName],
    ['Nickname', c.nickname],
    ['Class', c.classLabel],
    ['Year', c.yearLabel],
    ['Student Status', c.studentStatus],
    ['Phone Primary', c.phonePrimary],
    ['Phone Secondary', c.phoneSecondary],
    ['Email Primary', c.emailPrimary],
    ['Email Secondary', c.emailSecondary],
    ['Organization', c.organization],
    ['Job Title', c.jobTitle],
    ['Parent Name', c.parentName],
    ['Parent Phone', c.parentPhone],
    ['Parent Email', c.parentEmail],
    ['Parent Role', c.parentRole],
    ['WA Status', c.waPhoneStatus],
    ['Sync Status', c.syncStatus],
    ['Google Resource', c.googleResourceName],
    ['Labels', c.labels],
    ['Birthday', c.birthday],
    ['Notes', c.notes],
    ['Last Synced', c.lastSyncedAt],
    ['Last Error', c.lastError]
  ];

  var html = '<div class="modal-overlay" onclick="closeContactModal(event)">';
  html += '<div class="modal-content">';
  html += '<button class="modal-close" onclick="closeContactModal(event)">&times;</button>';
  html += '<div class="modal-title">' + esc(c.fullName || '(no name)') + '</div>';

  for (var f = 0; f < fields.length; f++) {
    var val = String(fields[f][1] || '').trim();
    if (!val) continue;
    html += '<div class="modal-field">';
    html += '<div class="modal-field-label">' + esc(fields[f][0]) + '</div>';
    html += '<div class="modal-field-value">' + esc(val) + '</div>';
    html += '</div>';
  }

  html += '</div></div>';

  var modalEl = document.getElementById('contact-modal');
  if (modalEl) modalEl.innerHTML = html;
}

function closeContactModal(event) {
  if (event) {
    var target = event.target;
    if (target.classList.contains('modal-overlay') || target.classList.contains('modal-close')) {
      var modalEl = document.getElementById('contact-modal');
      if (modalEl) modalEl.innerHTML = '';
    }
  }
}

/* ============================================
   TAB 3: SYNC
   ============================================ */
function loadSyncTab() {
  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      renderNamingPreview(data);
    })
    .withFailureHandler(function() {})
    .previewNaming(1);
}

function renderNamingPreview(data) {
  var el = document.getElementById('naming-preview-area');
  if (!el || !data || !data.presets) return;

  var html = '<div class="naming-preview">';
  for (var i = 0; i < data.presets.length; i++) {
    var p = data.presets[i];
    var cls = p.selected ? 'preset-item preset-selected' : 'preset-item';
    html += '<div class="' + cls + '">';
    html += '<strong>Preset ' + esc(String(p.id)) + ':</strong> ' + esc(p.example);
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function updateNamingPreview() {
  var presetSelect = document.getElementById('sync-preset');
  var presetId = presetSelect ? presetSelect.value : '1';
  google.script.run
    .withSuccessHandler(function(result) {
      renderNamingPreview(parseResult(result));
    })
    .withFailureHandler(function() {})
    .previewNaming(Number(presetId));
}

function runPreviewSync() {
  showLoading('sync-alert', 'Running preview sync (dry-run)...');
  disableButtons(true);
  startSyncPolling();

  google.script.run
    .withSuccessHandler(function(result) {
      stopSyncPolling();
      var data = parseResult(result);
      var msg = 'Preview: ' + (data.create || 0) + ' create, ' +
        (data.update || 0) + ' update, ' +
        (data.skip || 0) + ' skip, ' +
        (data.error || 0) + ' error';
      if (data.complete === false) {
        msg += ' (incomplete — run again to continue)';
      }
      showAlert('sync-alert', 'info', msg);
      disableButtons(false);
      renderSyncProgress(data);
    })
    .withFailureHandler(function(err) {
      stopSyncPolling();
      showAlert('sync-alert', 'error', 'Preview failed: ' + err.message);
      disableButtons(false);
    })
    .previewSync();
}

function runExecuteSync() {
  showLoading('sync-alert', 'Executing sync to Google Contacts...');
  disableButtons(true);
  startSyncPolling();

  google.script.run
    .withSuccessHandler(function(result) {
      stopSyncPolling();
      var data = parseResult(result);
      var msg = 'Sync: ' + (data.synced || 0) + ' synced, ' +
        (data.errors || 0) + ' errors, ' +
        (data.skipped || 0) + ' skipped';
      if (data.complete === false) {
        msg += ' (incomplete — run again to continue)';
      }
      showAlert('sync-alert', data.errors > 0 ? 'warning' : 'success', msg);
      disableButtons(false);
      renderSyncProgress(data);
    })
    .withFailureHandler(function(err) {
      stopSyncPolling();
      showAlert('sync-alert', 'error', 'Sync failed: ' + err.message);
      disableButtons(false);
    })
    .runSync();
}

/* === Sync Progress Polling === */
function startSyncPolling() {
  stopSyncPolling();
  syncProgressInterval = setInterval(function() {
    google.script.run
      .withSuccessHandler(function(result) {
        var data = parseResult(result);
        if (data.preview || data.run) {
          var progress = data.preview || data.run;
          renderSyncProgress({
            processed: progress.lastIndex || 0,
            total: progress.total || 0,
            complete: false
          });
        }
      })
      .withFailureHandler(function() {})
      .getSyncProgress();
  }, 3000);
}

function stopSyncPolling() {
  if (syncProgressInterval) {
    clearInterval(syncProgressInterval);
    syncProgressInterval = null;
  }
}

function renderSyncProgress(data) {
  var el = document.getElementById('sync-progress');
  if (!el) return;

  var total = data.total || 1;
  var processed = data.processed || data.synced || data.create || 0;
  if (data.complete) processed = total;
  var pct = Math.round((processed / total) * 100);

  var html = '<div class="progress-bar">' +
    '<div class="progress-fill" style="width:' + pct + '%"></div>' +
  '</div>' +
  '<p style="font-size:12px;color:#666;text-align:center;">' + pct + '% (' + processed + '/' + total + ')</p>';

  el.innerHTML = html;
}

function saveSyncConfig() {
  var classLabel = document.getElementById('sync-class-label');
  var yearLabel = document.getElementById('sync-year-label');
  var presetSelect = document.getElementById('sync-preset');
  var parentMode = document.querySelector('input[name="parent-mode"]:checked');
  var studentStatus = document.getElementById('sync-student-status');

  var updates = {};
  if (classLabel) updates.DEFAULT_CLASS_LABEL = classLabel.value;
  if (yearLabel) updates.DEFAULT_YEAR_LABEL = yearLabel.value;
  if (presetSelect) updates.NAMING_PRESET = presetSelect.value;
  if (parentMode) updates.PARENT_CONTACT_MODE = parentMode.value;
  if (studentStatus) updates.DEFAULT_STUDENT_STATUS = studentStatus.value;

  var keys = Object.keys(updates);
  for (var i = 0; i < keys.length; i++) {
    google.script.run.setConfigValue(keys[i], updates[keys[i]]);
  }
  showAlert('sync-alert', 'success', 'Sync settings saved');
}

/* ============================================
   TAB 4: WA CHECK
   ============================================ */
function loadWaTab() {
  clearElement('wa-alert');
  clearElement('wa-progress');

  // Show warning banner
  var progressEl = document.getElementById('wa-progress');
  if (progressEl) {
    progressEl.innerHTML =
      '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px 14px;margin-bottom:12px;color:#856404;font-size:13px;">' +
      '<strong>PERINGATAN:</strong> Gunakan nomor WA khusus (bukan nomor pribadi) untuk pengecekan. Risiko blokir oleh WhatsApp.' +
      '</div>' +
      '<div id="wa-quota-info" style="margin-bottom:12px;font-size:13px;color:#555;"></div>';
  }

  // Load quota info
  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      var dailyLimit = parseInt(data.WA_API_DAILY_LIMIT) || 100;
      var el = document.getElementById('wa-quota-info');
      if (el) {
        el.setAttribute('data-daily-limit', dailyLimit);
      }
    })
    .withFailureHandler(function() {})
    .loadConfig();
}

function testWaConnection() {
  showLoading('wa-alert', 'Testing connection...');

  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      if (data.success) {
        showAlert('wa-alert', 'success', 'Connected: ' + (data.message || 'OK'));
        var statusEl = document.getElementById('wa-status-indicator');
        if (statusEl) statusEl.innerHTML = '<span class="status-dot dot-green"></span>Connected';
      } else {
        showAlert('wa-alert', 'error', 'Disconnected: ' + (data.message || 'Failed'));
        var statusEl2 = document.getElementById('wa-status-indicator');
        if (statusEl2) statusEl2.innerHTML = '<span class="status-dot dot-red"></span>Disconnected';
      }
    })
    .withFailureHandler(function(err) {
      showAlert('wa-alert', 'error', 'Connection test failed: ' + err.message);
    })
    .testWaConnection();
}

function runCheckAllNumbers() {
  showLoading('wa-alert', 'Checking all numbers (this may take a while)...');
  disableButtons(true);

  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      if (data.success === false) {
        showAlert('wa-alert', 'error', data.message || 'Check failed');
        disableButtons(false);
        return;
      }

      var s = data.summary || {};
      var msg = 'Check complete: ' +
        (s.active || 0) + ' active, ' +
        (s.inactive || 0) + ' inactive, ' +
        (s.invalid || 0) + ' invalid, ' +
        (s.error || 0) + ' error';
      if (data.complete === false) {
        msg += ' (incomplete — run again to continue)';
      }
      if (typeof data.skipped !== 'undefined') {
        msg += '. Nomor di-skip (sudah dicek): ' + data.skipped;
      }
      if (typeof data.remainingToday !== 'undefined') {
        var quotaEl = document.getElementById('wa-quota-info');
        var dailyLimit = quotaEl ? (parseInt(quotaEl.getAttribute('data-daily-limit')) || 100) : 100;
        msg += '. Sisa kuota hari ini: ' + data.remainingToday + '/' + dailyLimit;
      }
      showAlert('wa-alert', 'success', msg);
      disableButtons(false);
      renderWaSummary(s);
    })
    .withFailureHandler(function(err) {
      showAlert('wa-alert', 'error', 'WA check failed: ' + err.message);
      disableButtons(false);
    })
    .checkAllContactNumbers();
}

function renderWaSummary(summary) {
  var el = document.getElementById('wa-summary');
  if (!el) return;

  var html = '<div class="card-grid">';
  html += buildWaCard(summary.active || 0, 'Active', 'badge-green');
  html += buildWaCard(summary.inactive || 0, 'Inactive', 'badge-red');
  html += buildWaCard(summary.invalid || 0, 'Invalid', 'badge-yellow');
  html += buildWaCard(summary.error || 0, 'Error', 'badge-red');
  html += '</div>';

  el.innerHTML = html;
}

function buildWaCard(value, label, badgeClass) {
  return '<div class="card">' +
    '<div class="card-value">' + esc(String(value)) + '</div>' +
    '<div class="card-label"><span class="badge ' + badgeClass + '">' + esc(label) + '</span></div>' +
  '</div>';
}

/* ============================================
   TAB 5: LOGS
   ============================================ */
function loadLogs() {
  showLoading('logs-table-wrap', 'Loading logs...');

  google.script.run
    .withSuccessHandler(function(result) {
      logsData = parseResult(result);
      if (!Array.isArray(logsData)) logsData = [];
      renderLogsTable(logsData);
    })
    .withFailureHandler(function(err) {
      showAlert('logs-alert', 'error', 'Failed to load logs: ' + err.message);
    })
    .getRecentLogs(100);
}

function renderLogsTable(logs) {
  var el = document.getElementById('logs-table-wrap');
  if (!el) return;

  if (!logs || logs.length === 0) {
    el.innerHTML = '<div class="alert alert-info">No logs found.</div>';
    return;
  }

  var html = '<div class="table-wrap"><table>';
  html += '<thead><tr>';
  html += '<th>Timestamp</th><th>Row ID</th><th>Action</th><th>Result</th><th>Message</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < logs.length; i++) {
    var log = logs[i];
    var resultBadge = 'badge-gray';
    if (log.result === 'success') resultBadge = 'badge-green';
    else if (log.result === 'error') resultBadge = 'badge-red';
    else if (log.result === 'warning') resultBadge = 'badge-yellow';

    html += '<tr>';
    html += '<td>' + esc(log.timestamp) + '</td>';
    html += '<td>' + esc(log.rowId) + '</td>';
    html += '<td>' + esc(log.action) + '</td>';
    html += '<td><span class="badge ' + resultBadge + '">' + esc(log.result) + '</span></td>';
    html += '<td>' + esc(log.message) + '</td>';
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function filterLogs() {
  var actionFilter = document.getElementById('log-filter-action');
  var resultFilter = document.getElementById('log-filter-result');
  var actionVal = actionFilter ? actionFilter.value : '';
  var resultVal = resultFilter ? resultFilter.value : '';

  var filtered = [];
  for (var i = 0; i < logsData.length; i++) {
    var log = logsData[i];
    if (actionVal && String(log.action) !== actionVal) continue;
    if (resultVal && String(log.result) !== resultVal) continue;
    filtered.push(log);
  }

  renderLogsTable(filtered);
}

function clearAllLogs() {
  if (!confirm('Clear all logs?')) return;
  google.script.run
    .withSuccessHandler(function() {
      showAlert('logs-alert', 'success', 'Logs cleared');
      logsData = [];
      renderLogsTable([]);
    })
    .withFailureHandler(function(err) {
      showAlert('logs-alert', 'error', 'Failed to clear logs: ' + err.message);
    })
    .clearLogs();
}

/* ============================================
   TAB 6: CONFIG
   ============================================ */
function loadConfigTab() {
  showLoading('config-form-area', 'Loading config...');

  google.script.run
    .withSuccessHandler(function(result) {
      var config = parseResult(result);
      renderConfigForm(config);
    })
    .withFailureHandler(function(err) {
      showAlert('config-alert', 'error', 'Failed to load config: ' + err.message);
    })
    .loadConfig();
}

function renderConfigForm(config) {
  var el = document.getElementById('config-form-area');
  if (!el) return;

  var groups = {
    'Source': ['SOURCE_SPREADSHEET_ID', 'SOURCE_SHEET'],
    'General': ['CONTACTS_SHEET', 'SYNCLOG_SHEET', 'DUPLICATES_SHEET', 'CONFIG_SHEET', 'DEFAULT_ORGANIZATION', 'DEFAULT_GROUP_NAME'],
    'Naming': ['NAMING_PRESET', 'DEFAULT_CLASS_LABEL', 'DEFAULT_YEAR_LABEL', 'DEFAULT_STUDENT_STATUS'],
    'Parent Mode': ['PARENT_CONTACT_MODE', 'DRY_RUN_DEFAULT'],
    'WA API': ['WA_API_ENABLED', 'WA_API_BASE_URL', 'WA_API_DEVICE_JID', 'WA_API_TIMEOUT_MS', 'WA_API_BASIC_AUTH_USER', 'WA_API_BASIC_AUTH_PASS', 'WA_API_BATCH_DELAY_MS', 'WA_API_JITTER_MS', 'WA_API_BATCH_SIZE', 'WA_API_BATCH_PAUSE_MS', 'WA_API_DAILY_LIMIT', 'WA_API_RECHECK_DAYS'],
    'Advanced': ['DEBUG_MODE']
  };

  var html = '';
  var groupNames = Object.keys(groups);
  for (var g = 0; g < groupNames.length; g++) {
    var groupName = groupNames[g];
    var keys = groups[groupName];
    html += '<div class="config-group">';
    html += '<div class="config-group-title">' + esc(groupName) + '</div>';

    for (var k = 0; k < keys.length; k++) {
      var key = keys[k];
      var val = config[key] !== undefined ? String(config[key]) : '';
      html += '<div class="form-group">';
      html += '<label for="cfg-' + esc(key) + '">' + esc(key) + '</label>';

      if (key === 'DEFAULT_STUDENT_STATUS') {
        html += '<select id="cfg-' + esc(key) + '" class="form-control" data-config-key="' + esc(key) + '">';
        html += '<option value="aktif"' + (val === 'aktif' ? ' selected' : '') + '>aktif</option>';
        html += '<option value="berhenti"' + (val === 'berhenti' ? ' selected' : '') + '>berhenti</option>';
        html += '<option value="lulus"' + (val === 'lulus' ? ' selected' : '') + '>lulus</option>';
        html += '</select>';
      } else if (key === 'PARENT_CONTACT_MODE') {
        html += '<select id="cfg-' + esc(key) + '" class="form-control" data-config-key="' + esc(key) + '">';
        html += '<option value="consolidated"' + (val === 'consolidated' ? ' selected' : '') + '>Consolidated</option>';
        html += '<option value="separate"' + (val === 'separate' ? ' selected' : '') + '>Separate</option>';
        html += '</select>';
      } else if (key === 'WA_API_ENABLED' || key === 'DRY_RUN_DEFAULT' || key === 'DEBUG_MODE') {
        html += '<select id="cfg-' + esc(key) + '" class="form-control" data-config-key="' + esc(key) + '">';
        html += '<option value="true"' + (val === 'true' ? ' selected' : '') + '>true</option>';
        html += '<option value="false"' + (val === 'false' ? ' selected' : '') + '>false</option>';
        html += '</select>';
      } else if (key === 'WA_API_BASIC_AUTH_PASS') {
        html += '<input type="password" id="cfg-' + esc(key) + '" class="form-control" value="' + esc(val) + '" data-config-key="' + esc(key) + '" />';
      } else {
        html += '<input type="text" id="cfg-' + esc(key) + '" class="form-control" value="' + esc(val) + '" data-config-key="' + esc(key) + '" />';
      }

      html += '</div>';
    }

    html += '</div>';
  }

  el.innerHTML = html;
}

function saveAllConfig() {
  showLoading('config-alert', 'Saving config...');

  var inputs = document.querySelectorAll('[data-config-key]');
  var configObj = {};
  for (var i = 0; i < inputs.length; i++) {
    var key = inputs[i].getAttribute('data-config-key');
    configObj[key] = inputs[i].value;
  }

  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      showAlert('config-alert', 'success', 'Config saved (' + (data.saved || 0) + ' keys)');
    })
    .withFailureHandler(function(err) {
      showAlert('config-alert', 'error', 'Failed to save: ' + err.message);
    })
    .saveConfig(configObj);
}

function resetConfigDefaults() {
  if (!confirm('Reset all config to defaults?')) return;
  loadConfigTab();
  showAlert('config-alert', 'info', 'Form reset to current values. Edit and save to apply defaults.');
}

/* ============================================
   TAB 7: DATA QUALITY
   ============================================ */
function loadQualityTab() {
  showLoading('quality-table-wrap', 'Loading quality report...');

  google.script.run
    .withSuccessHandler(function(result) {
      var data = parseResult(result);
      qualityData = (data && data.data) || [];
      qualityFilterType = '';
      renderInvalidTable(qualityData);
      var summary = 'Total: ' + (data.total || 0) + ' contacts, ' + (data.invalid || 0) + ' invalid';
      showAlert('quality-alert', data.invalid > 0 ? 'warning' : 'success', summary);
    })
    .withFailureHandler(function(err) {
      showAlert('quality-alert', 'error', 'Failed to load quality data: ' + err.message);
    })
    .getInvalidContacts();
}

function renderInvalidTable(data) {
  var el = document.getElementById('quality-table-wrap');
  if (!el) return;

  if (!data || data.length === 0) {
    el.innerHTML = '<div class="alert alert-success">All contacts are valid!</div>';
    return;
  }

  var html = '<div class="table-wrap"><table>';
  html += '<thead><tr>';
  html += '<th>Row#</th><th>Name</th><th>Phone</th><th>Email</th><th>Class</th><th>Errors</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    html += '<tr>';
    html += '<td>' + esc(String(d.row)) + '</td>';
    html += '<td>' + esc(d.fullName) + '</td>';
    html += '<td>' + esc(d.phonePrimary) + '</td>';
    html += '<td>' + esc(d.emailPrimary) + '</td>';
    html += '<td>' + esc(d.classLabel) + '</td>';
    html += '<td>';
    var errs = d.errors || [];
    for (var e = 0; e < errs.length; e++) {
      html += '<span class="badge badge-red" style="margin:2px;">' + esc(errs[e]) + '</span>';
    }
    html += '</td>';
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function filterInvalidByType(type) {
  qualityFilterType = type;

  var pills = document.querySelectorAll('#quality-filter-pills .filter-pill');
  for (var p = 0; p < pills.length; p++) {
    pills[p].classList.remove('active');
  }

  if (!type) {
    if (pills.length > 0) pills[0].classList.add('active');
    renderInvalidTable(qualityData);
    return;
  }

  var el = event && event.target;
  if (el) el.classList.add('active');

  var filtered = [];
  for (var i = 0; i < qualityData.length; i++) {
    var errs = qualityData[i].errors || [];
    for (var e = 0; e < errs.length; e++) {
      if (errs[e].indexOf(type) !== -1) {
        filtered.push(qualityData[i]);
        break;
      }
    }
  }
  renderInvalidTable(filtered);
}

function exportInvalidCSV() {
  showLoading('quality-alert', 'Generating CSV...');

  google.script.run
    .withSuccessHandler(function(csvString) {
      var blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'invalid_contacts_siswahub.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showAlert('quality-alert', 'success', 'CSV exported successfully');
    })
    .withFailureHandler(function(err) {
      showAlert('quality-alert', 'error', 'Export failed: ' + err.message);
    })
    .exportInvalidAsCSV();
}
</script>
